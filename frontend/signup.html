<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
</head>
<body>

<h1>Signup</h1>

<input id="username"
placeholder="Username">

<input id="password"
type="password"
placeholder="Password">

<button onclick="signup()">
Signup
</button>

<script>

async function signup(){

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

const response =
await fetch(
"https://YOUR-RENDER-URL.onrender.com/signup",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username,
password
})
}
);

const data =
await response.json();

alert(data.message);

}

</script>

</body>
</html>
